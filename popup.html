<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tocic</title>
  <link rel="stylesheet" href="widget.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body id="tocic-popup-body">

  <!-- Toolbar: logo + title + per-site enabled toggle -->
  <div id="popup-toolbar">
    <svg class="tn-logo" viewBox="0 0 20 20" fill="none" stroke="currentColor"
        stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
        width="18" height="18" aria-hidden="true">
      <circle cx="10" cy="10" r="8"/>
      <path d="M7 7h6M7 10h4M7 13h5"/>
    </svg>
    <span id="popup-title">Tocic</span>
    <div id="popup-enabled-wrap">
      <label class="tn-toggle-wrap">
        <input type="checkbox" id="popup-enabled-toggle">
        <span class="tn-toggle-track"><span class="tn-toggle-thumb"></span></span>
      </label>
    </div>
  </div>

  <!-- Per-site state hint (natural vs overridden) -->
  <div id="popup-toggle-hint" data-state="natural"></div>

  <!-- Settings -->
  <div id="popup-settings">
    <div class="tn-settings-title">Settings</div>
    <div class="tn-settings-controls" id="popup-controls"></div>
    <div class="tn-settings-footer">
      <button id="popup-reset-btn">Reset to defaults</button>
    </div>

    <div class="tn-settings-title tn-hotkeys-title">Hotkeys</div>
    <div class="tn-hotkeys-list" id="popup-hotkeys-list">
      <div class="tn-hotkey-row">
        <span class="tn-hotkey-label">Toggle widget</span>
        <input class="tn-hotkey-input" data-action="toggleWidget" type="text" placeholder="click to record">
      </div>
      <div class="tn-hotkey-row">
        <span class="tn-hotkey-label">Add page &amp; enable</span>
        <input class="tn-hotkey-input" data-action="addAndEnable" type="text" placeholder="click to record">
      </div>
    </div>

    <div class="tn-settings-title tn-urls-title">Custom URL patterns</div>
    <div id="popup-url-list"></div>
    <div class="tn-url-add-row">
      <input id="popup-url-input" type="text"
             placeholder="regex, e.g. https://x\.com/.+/article/\d+"
             spellcheck="false">
      <input id="popup-url-label" type="text" placeholder="label (optional)">
      <button id="popup-url-add">Add</button>
    </div>
  </div>

  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
